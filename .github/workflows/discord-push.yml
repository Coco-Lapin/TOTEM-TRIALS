name: Discord Push Notification

on:
  push:

permissions:
  contents: read

jobs:
  notify-discord:
    runs-on: ubuntu-latest
    steps:
      - name: Send push summary to Discord
        uses: actions/github-script@v8
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        with:
          script: |
            const webhookUrl = process.env.DISCORD_WEBHOOK_URL;
            if (!webhookUrl) {
              core.setFailed("Missing secret DISCORD_WEBHOOK_URL");
              return;
            }

            const payload = context.payload || {};
            const commits = Array.isArray(payload.commits) ? payload.commits : [];
            if (commits.length === 0) {
              core.info("No commits in push payload. Nothing to send.");
              return;
            }

            const short = (value, max) => {
              const text = String(value || "");
              if (text.length <= max) return text;
              return `${text.slice(0, Math.max(0, max - 3))}...`;
            };

            const firstLine = (message) =>
              String(message || "").split("\n")[0].trim() || "(empty message)";

            const formatList = (lines, maxLines, label) => {
              if (lines.length === 0) return `No ${label} detected`;
              if (lines.length <= maxLines) return lines.join("\n");
              const visible = lines.slice(0, maxLines);
              visible.push(`- ... +${lines.length - maxLines} ${label}(s)`);
              return visible.join("\n");
            };

            const mapStatus = (status) => {
              switch (status) {
                case "added":
                  return "A";
                case "removed":
                  return "D";
                case "renamed":
                  return "R";
                case "copied":
                  return "C";
                default:
                  return "M";
              }
            };

            const branch = String(payload.ref || "").replace("refs/heads/", "") || "unknown";
            const pusher =
              payload.pusher?.name || payload.sender?.login || payload.pusher?.email || "unknown";
            const repo =
              payload.repository?.full_name || `${context.repo.owner}/${context.repo.repo}`;
            const compareUrl =
              payload.compare ||
              (payload.before && payload.after
                ? `https://github.com/${repo}/compare/${payload.before}...${payload.after}`
                : `https://github.com/${repo}`);

            const commitLines = commits.map((commit) => {
              const sha = String(commit.id || "").slice(0, 7) || "unknown";
              return `- ${sha} ${firstLine(commit.message)}`;
            });

            const filesFromPayload = new Map();
            for (const commit of commits) {
              for (const file of commit.added || []) filesFromPayload.set(file, "added");
              for (const file of commit.modified || []) filesFromPayload.set(file, "modified");
              for (const file of commit.removed || []) filesFromPayload.set(file, "removed");
            }

            let changedFiles = [];
            const hasBeforeAfter =
              payload.before &&
              payload.after &&
              !/^0+$/.test(String(payload.before)) &&
              !/^0+$/.test(String(payload.after));

            if (hasBeforeAfter) {
              try {
                const comparison = await github.rest.repos.compareCommitsWithBasehead({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  basehead: `${payload.before}...${payload.after}`,
                });

                changedFiles = (comparison.data.files || []).map((file) => ({
                  filename: file.filename,
                  status: file.status || "modified",
                }));
              } catch (error) {
                core.warning(
                  `Compare API failed, fallback to payload files: ${error.message}`
                );
              }
            }

            if (changedFiles.length === 0) {
              changedFiles = [...filesFromPayload.entries()].map(([filename, status]) => ({
                filename,
                status,
              }));
            }

            const fileLines = changedFiles
              .sort((a, b) => a.filename.localeCompare(b.filename))
              .map((file) => `- [${mapStatus(file.status)}] ${file.filename}`);

            const pushDateRaw =
              payload.head_commit?.timestamp ||
              commits[commits.length - 1]?.timestamp ||
              new Date().toISOString();
            const pushDate = new Date(pushDateRaw);
            const safeDate = Number.isNaN(pushDate.getTime()) ? new Date() : pushDate;
            const unixTime = Math.floor(safeDate.getTime() / 1000);

            const commitMessages = short(formatList(commitLines, 12, "commit"), 1024);
            const modifiedFiles = short(formatList(fileLines, 18, "file"), 1024);
            const summary = short(
              `${repo} | ${branch} | ${pusher} | ${commits.length} commit(s)`,
              2000
            );

            const discordPayload = {
              username: "GitHub Push Bot",
              avatar_url:
                "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png",
              content: summary,
              embeds: [
                {
                  title: `Push on ${repo}`,
                  url: compareUrl,
                  color: 0x2ea043,
                  fields: [
                    { name: "Branch", value: `\`${branch}\``, inline: true },
                    { name: "Pushed by", value: pusher, inline: true },
                    { name: "Commit count", value: String(commits.length), inline: true },
                    { name: "Time", value: `<t:${unixTime}:F>`, inline: true },
                    { name: "Compare", value: `[Open diff](${compareUrl})`, inline: true },
                    { name: "Modified files", value: modifiedFiles },
                    { name: "Commit messages", value: commitMessages }
                  ],
                  footer: {
                    text: `${context.workflow} • #${context.runNumber}`,
                  },
                  timestamp: safeDate.toISOString()
                }
              ]
            };

            const response = await fetch(webhookUrl, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(discordPayload)
            });

            if (!response.ok) {
              const responseText = await response.text();
              core.setFailed(
                `Discord webhook failed (${response.status}): ${responseText}`
              );
            } else {
              core.info("Discord notification sent.");
            }
